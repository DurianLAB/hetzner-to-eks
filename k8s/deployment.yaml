apiVersion: apps/v1
kind: Deployment
metadata:
  name: hetzner-to-eks-docs
  labels:
    app: hetzner-to-eks-docs
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hetzner-to-eks-docs
  template:
    metadata:
      labels:
        app: hetzner-to-eks-docs
    spec:
      containers:
        - name: docs
          image: durianlab/hetzner-to-eks:latest
          ports:
            - containerPort: 80
              name: http
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
