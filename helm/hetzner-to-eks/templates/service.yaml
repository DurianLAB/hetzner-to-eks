{{- /*
Service template for hetzner-to-eks docs site
*/ -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hetzner-to-eks.fullname" . }}
  labels:
    {{- include "hetzner-to-eks.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "hetzner-to-eks.selectorLabels" . | nindent 4 }}
